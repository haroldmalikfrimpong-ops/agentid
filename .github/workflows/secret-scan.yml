name: Secret Scan

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -e
          VERSION=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan working tree (full repo)
        run: |
          gitleaks dir . \
            --no-banner \
            --redact \
            --config .gitleaks.toml \
            --report-format sarif \
            --report-path gitleaks-tree.sarif \
            --exit-code 1

      - name: Scan git history
        run: |
          gitleaks git . \
            --no-banner \
            --redact \
            --config .gitleaks.toml \
            --report-format sarif \
            --report-path gitleaks-git.sarif \
            --exit-code 1

      - name: Upload SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-sarif
          path: gitleaks-*.sarif
